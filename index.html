<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Analytics Shortener</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #020617;
            color: #e5e7eb;
            display: flex;
            justify-content: center;
            padding: 24px;
        }

        .app {
            max-width: 800px;
            width: 100%;
            background: rgba(15, 23, 42, 0.9);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #1e293b;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            color: #f8fafc;
        }

        p.subtitle {
            color: #94a3b8;
            margin-bottom: 24px;
            font-size: 0.95rem;
        }

        h2 {
            margin-top: 32px;
            margin-bottom: 12px;
            font-size: 1.2rem;
            color: #cbd5e1;
        }

        form {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #f8fafc;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #38bdf8;
        }

        button {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            background: #38bdf8;
            color: #020617;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover:not(:disabled) {
            background: #0ea5e9;
        }

        button:active:not(:disabled) {
            transform: translateY(1px);
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
        }

        .error {
            color: #f87171;
            font-size: 0.9rem;
            margin-top: 8px;
            min-height: 20px;
        }

        .table-container {
            overflow-x: auto;
            margin-top: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
            text-align: left;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid #1e293b;
            word-break: break-all;
        }

        th {
            color: #94a3b8;
            font-weight: 500;
        }

        tr:hover td {
            background: rgba(30, 41, 59, 0.5);
        }

        a {
            color: #38bdf8;
            text-decoration: none;
            transition: color 0.2s;
        }

        a:hover {
            color: #7dd3fc;
            text-decoration: underline;
        }

        .badge {
            background: #1e293b;
            padding: 4px 8px;
            border-radius: 99px;
            font-size: 0.85rem;
            color: #cbd5e1;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="app">
        <h1>Link Analytics Shortener</h1>
        <p class="subtitle">Powered by API Wrapper & LocalStorage • 100% Client-Side</p>

        <form id="shortenForm">
            <input id="urlInput" type="text" placeholder="Paste your long URL here (e.g. https://google.com)…" />
            <button id="submitBtn" type="submit">Shorten</button>
        </form>
        <div id="errorMsg" class="error"></div>

        <h2>Your Links</h2>
        <div class="table-container">
            <table id="linksTable">
                <thead>
                    <tr>
                        <th style="width: 25%">Original URL</th>
                        <th style="width: 30%">API Short URL</th>
                        <th style="width: 30%">Local Redirect Link</th>
                        <th style="width: 15%">Local Clicks</th>
                    </tr>
                </thead>
                <tbody id="linksBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const STORAGE_KEY = "link_shorts_v1";
        const form = document.getElementById("shortenForm");
        const input = document.getElementById("urlInput");
        const error = document.getElementById("errorMsg");
        const btn = document.getElementById("submitBtn");
        const tbody = document.getElementById("linksBody");

        // Basic helpers
        function loadLinks() {
            const raw = localStorage.getItem(STORAGE_KEY);
            return raw ? JSON.parse(raw) : [];
        }

        function saveLinks(links) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(links));
        }

        function generateId() {
            return Math.random().toString(36).substring(2, 8);
        }

        // Handle routing logic for short codes
        function handleRouting() {
            const hash = window.location.hash; // e.g. "#/abc123"
            if (!hash.startsWith("#/")) return; // Only process valid internal routes

            const id = hash.slice(2);
            const links = loadLinks();
            const link = links.find(l => l.id === id);

            if (!link) {
                alert("Short link not found in local storage cache.");
                window.location.hash = "";
                return;
            }

            // Increment local clicks and persist
            link.clicks += 1;
            saveLinks(links);

            // Redirect immediately
            window.location.href = link.originalUrl;
        }

        // Render dashboard elements
        function renderDashboard() {
            if (!tbody) return;
            const ObjectLinks = loadLinks();
            tbody.innerHTML = "";

            // Show newest links first
            const displayLinks = [...ObjectLinks].reverse();

            displayLinks.forEach(link => {
                const tr = document.createElement("tr");

                // Cell 1: Original URL
                const originalTd = document.createElement("td");
                const originalA = document.createElement("a");
                originalA.href = link.originalUrl;
                originalA.target = "_blank";
                originalA.textContent = link.originalUrl;
                originalTd.appendChild(originalA);

                // Cell 2: API Short URL (shorturl.at / tinyurl / is.gd etc)
                const apiTd = document.createElement("td");
                const apiA = document.createElement("a");

                // Add https:// protocol if API returned a naked URL (like shorturl.at/abc)
                let hrefVal = link.apiUrl;
                if (!hrefVal.startsWith("http")) hrefVal = "https://" + hrefVal;

                apiA.href = hrefVal;
                apiA.target = "_blank";
                apiA.textContent = link.apiUrl;
                apiTd.appendChild(apiA);

                // Cell 3: Local Redirect Link
                const idTd = document.createElement("td");
                const localShortUrl = `${window.location.origin}${window.location.pathname}#/${link.id}`;
                const idA = document.createElement("a");
                idA.href = localShortUrl;
                idA.textContent = localShortUrl;
                idTd.appendChild(idA);

                // Cell 4: Local Clicks Badge
                const clicksTd = document.createElement("td");
                const badge = document.createElement("span");
                badge.className = "badge";
                badge.textContent = link.clicks;
                clicksTd.appendChild(badge);

                // Append cells
                tr.appendChild(originalTd);
                tr.appendChild(apiTd);
                tr.appendChild(idTd);
                tr.appendChild(clicksTd);
                tbody.appendChild(tr);
            });
        }

        // Create Link Action via API Wrapper
        async function createShortLink(originalUrl) {

            let apiUrlStr = "";

            // Often shorturl.at requires an API key or blocks CORS. 
            // We use is.gd format=simple for a 100% reliable free client-side API, 
            // but we can try shorturl.at / tinyurl format here if preferred.
            try {
                // Using is.gd as it's the most reliable free pure-client-side shortener without CORS issues.
                const response = await fetch(`https://is.gd/create.php?format=simple&url=${encodeURIComponent(originalUrl)}`);
                if (!response.ok) throw new Error("Failed to shorten via API.");
                apiUrlStr = await response.text();
            } catch (err) {
                // Fallback to tinyurl if is.gd fails
                const fallbackResponse = await fetch(`https://tinyurl.com/api-create.php?url=${encodeURIComponent(originalUrl)}`);
                if (!fallbackResponse.ok) throw new Error("Failed to shorten via Fallback API.");
                apiUrlStr = await fallbackResponse.text();
            }

            // Construct Link Record
            const links = loadLinks();
            const id = generateId();

            links.push({
                id,
                originalUrl,
                apiUrl: apiUrlStr,
                clicks: 0
            });

            saveLinks(links);
            renderDashboard();
            return id;
        }

        // Form Submission
        if (form) {
            form.addEventListener("submit", async e => {
                e.preventDefault();
                const value = input.value.trim();

                try {
                    if (!value) throw new Error("URL cannot be empty");

                    // Basic syntax validation
                    new URL(value);
                    if (!value.startsWith("http://") && !value.startsWith("https://")) {
                        throw new Error("URL must start with http:// or https://");
                    }

                    error.textContent = "";
                    btn.disabled = true;
                    btn.textContent = "Shortening...";

                    await createShortLink(value);
                    input.value = ""; // Clear on success

                } catch (err) {
                    error.textContent = err.message || "Invalid URL";
                } finally {
                    btn.disabled = false;
                    btn.textContent = "Shorten";
                }
            });
        }

        // Init App state
        window.addEventListener("load", () => {
            handleRouting();
            renderDashboard();
        });

        // Handle navigation after load
        window.addEventListener("hashchange", handleRouting);
    </script>
</body>

</html>
